name: TypeScript
on: [push, pull_request]
jobs:
  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Lint (biome)
        run: npm run lint --workspaces --if-present
      - name: Build
        run: npm run build --workspace=wbauth
      - name: Tests
        run: npm run test --workspace=wbauth --if-present
