name: Python
on: [push, pull_request]
jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Sync workspace
        run: uv sync --all-extras --dev --all-packages
      - name: Lint (ruff)
        run: uv run ruff check python/
      - name: Type check (pyright)
        # cd into python/ so pyright auto-discovers `python/pyrightconfig.json`
        # (it walks up from CWD, not from CLI-arg paths). The config relaxes
        # Optional access for tests and silences pyauth's private-import noise.
        run: cd python && uv run pyright src tests
      - name: Tests
        run: uv run pytest python/tests/ -v
